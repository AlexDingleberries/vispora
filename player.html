<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Playing — vispora</title>
<link rel="stylesheet" href="/css/global.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/pages.css">
<script src="/js/storage.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/cloak.js"></script>
<script src="/js/app.js"></script>
</head>
<body>
<div id="particles-js"></div>
<div id="nav-ph"></div>
<main class="player-page page-enter container">
  <nav class="breadcrumb">
    <a href="home.html">Home</a><span class="breadcrumb-sep">›</span>
    <a href="games.html">Games</a><span class="breadcrumb-sep">›</span>
    <span id="bc-game">Loading…</span>
  </nav>
  <div class="player-header">
    <div>
      <h1 class="player-title" id="game-title">Loading…</h1>
      <div class="player-author" id="game-author"></div>
      <div class="player-tags" id="game-tags"></div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-shrink:0">
      <div id="pt-display" style="font-size:0.75rem;color:var(--text-secondary);text-align:right;line-height:1.4"></div>
      <button class="btn btn-secondary" id="back-btn" type="button">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Games
      </button>
    </div>
  </div>
  <div class="player-iframe-wrap" id="iframe-wrap">
    <div class="player-error" id="player-error" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <strong>Game failed to load</strong>
      <p id="error-link"></p>
    </div>
    <iframe id="game-frame" title="Game" allowfullscreen allow="autoplay; fullscreen; pointer-lock"
      sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-popups" style="display:none"></iframe>
  </div>
  <div class="player-controls">
    <button class="btn-icon" id="btn-fs" title="Fullscreen" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
    </button>
    <button class="btn-icon" id="btn-reload" title="Reload" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
    </button>
    <button class="btn-icon" id="btn-fav" title="Favorite" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </button>
    <div style="width:1px;height:22px;background:var(--card-border);margin:0 4px"></div>
    <span id="session-time" style="font-size:0.75rem;color:var(--text-secondary);min-width:44px;text-align:center;font-weight:500"></span>
  </div>
</main>
<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script>
document.getElementById('nav-ph').innerHTML=VApp.navHTML('games');
VCloak.initCloak();VApp.initPanic();VApp.initParticles();
const dtEl=document.getElementById('nav-datetime');if(dtEl)VApp.startDatetime(dtEl);

const params=new URLSearchParams(location.search);
const gameId=params.get('id');
if(!gameId){location.href='games.html';}

let game=null,sessionStart=null,sessionMs=0,sessionTimer=null,isFs=false;

async function initPlayer(){
  const games=await VApp.loadGames();
  game=games.find(g=>String(g.id)===String(gameId));
  if(!game){VApp.showToast('Game not found','error');setTimeout(()=>location.href='games.html',1500);return;}

  document.title=`${game.name} — vispora`;
  document.getElementById('game-title').textContent=game.name;
  document.getElementById('bc-game').textContent=game.name;
  document.getElementById('game-author').innerHTML=`by <strong>${VApp.esc(game.author||'Unknown')}</strong>`;

  const tags=[...(game.special||[]),...(game.genres||[])].slice(0,5);
  document.getElementById('game-tags').innerHTML=tags.map(t=>`<span class="tag tag-accent">${VApp.esc(t)}</span>`).join('');

  updateFavBtn();
  updatePtDisplay(VStorage.getPlaytime(game.id));

  const frame=document.getElementById('game-frame');
  const err=document.getElementById('player-error');
  if(game.url){
    frame.src=game.url;frame.style.display='';
    frame.onload=()=>{startSession();VStorage.addToHistory(game);};
    frame.onerror=()=>{frame.style.display='none';err.style.display='flex';document.getElementById('error-link').innerHTML=`<a href="${VApp.esc(game.url)}" target="_blank" style="color:var(--accent)">Open directly ↗</a>`;};
  }else{frame.style.display='none';err.style.display='flex';}
}

function startSession(){sessionStart=Date.now();sessionTimer=setInterval(tickSession,1000);}
function tickSession(){if(!sessionStart)return;const el=document.getElementById('session-time');if(el)el.textContent=VStorage.formatTime(Date.now()-sessionStart+sessionMs)||'<1m';}
function saveSession(){if(!game||!sessionStart)return;const e=Date.now()-sessionStart;sessionMs+=e;sessionStart=null;if(e>2000){VStorage.addPlaytime(game.id,e);VStorage.addToHistory(game);}}
function updatePtDisplay(ms){const el=document.getElementById('pt-display');const t=VStorage.formatTime(ms);el.innerHTML=t?`Total playtime<br><strong style="color:var(--accent)">${t}</strong>`:'';;}

document.addEventListener('visibilitychange',()=>{
  if(document.hidden){if(sessionStart){saveSession();clearInterval(sessionTimer);}}
  else{if(game){sessionStart=Date.now();sessionTimer=setInterval(tickSession,1000);}}
});
window.addEventListener('beforeunload',saveSession);
window.addEventListener('pagehide',saveSession);

document.getElementById('back-btn').onclick=()=>{saveSession();clearInterval(sessionTimer);window.location.href = "games.html"};

const wrap=document.getElementById('iframe-wrap');
const btnFs=document.getElementById('btn-fs');
const fsIcon=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>`;
const fsExitIcon=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>`;

btnFs.onclick=()=>{
  isFs=!isFs;wrap.classList.toggle('fullscreen-mode',isFs);btnFs.innerHTML=isFs?fsExitIcon:fsIcon;
  if(isFs){wrap.requestFullscreen?.().catch(()=>{});}else if(document.fullscreenElement)document.exitFullscreen?.();
};
document.addEventListener('fullscreenchange',()=>{if(!document.fullscreenElement&&isFs){isFs=false;wrap.classList.remove('fullscreen-mode');btnFs.innerHTML=fsIcon;}});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&isFs){isFs=false;wrap.classList.remove('fullscreen-mode');btnFs.innerHTML=fsIcon;if(document.fullscreenElement)document.exitFullscreen?.();}});

document.getElementById('btn-reload').onclick=()=>{const f=document.getElementById('game-frame');f.src=f.src;VApp.showToast('Reloaded');};
document.getElementById('btn-fav').onclick=()=>{if(!game)return;const a=VStorage.toggleFavorite(game.id);updateFavBtn();VApp.showToast(a?'Added to favorites':'Removed from favorites');};

function updateFavBtn(){
  if(!game)return;
  const btn=document.getElementById('btn-fav');
  const isFav=VStorage.isFavorite(game.id);
  btn.style.color=isFav?'var(--accent)':'';
  btn.innerHTML=isFav
    ?`<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`
    :`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
  btn.title=isFav?'Remove from favorites':'Add to favorites';
}

initPlayer();
</script>
</body></html>
