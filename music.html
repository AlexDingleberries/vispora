<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Music - vispora</title>
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/pages.css">
<script src="js/storage.js"></script>
<script src="js/theme.js"></script>
<script src="js/cloak.js"></script>
<script src="js/app.js"></script>
<style>
.music-page{padding-top:calc(var(--nav-h) + 26px);padding-bottom:40px;min-height:100vh}
.music-layout{display:grid;grid-template-columns:1.5fr .95fr;gap:14px}
.music-panel{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-xl);padding:14px}
.music-title{font-size:2.2rem;font-weight:800;margin-bottom:8px}
.music-search-wrap{position:relative}
.music-search{width:100%;padding:12px 14px;border-radius:100px;background:var(--bg3);border:1px solid var(--card-border);color:var(--text);outline:none}
.music-search:focus{border-color:rgba(var(--accent-rgb),.35);box-shadow:0 0 0 3px rgba(var(--accent-rgb),.08)}
.music-search-status{font-size:.72rem;color:var(--text-secondary);margin:8px 2px 0}
.music-track-list{display:flex;flex-direction:column;gap:8px;max-height:420px;overflow:auto;padding-right:4px}
.music-track{display:flex;align-items:center;gap:10px;padding:8px;border-radius:12px;border:1px solid var(--card-border);background:var(--bg2);transition:all .16s;cursor:pointer}
.music-track:hover,.music-track.active{border-color:rgba(var(--accent-rgb),.35);background:var(--accent-dim)}
.music-track-cover{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0}
.music-track-main{min-width:0;flex:1}
.music-track-title{font-size:.85rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.music-track-sub{font-size:.73rem;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.music-track-actions{display:flex;align-items:center;gap:4px}
.music-mini-btn{height:26px;min-width:26px;padding:0 7px;border-radius:8px;background:var(--bg4);border:1px solid var(--card-border);color:var(--text-secondary);font-size:.68rem;font-weight:700}
.music-mini-btn:hover{color:var(--accent);border-color:rgba(var(--accent-rgb),.35)}
.music-mini-btn.on{color:var(--accent);border-color:rgba(var(--accent-rgb),.4)}
.music-empty{padding:18px;text-align:center;color:var(--text-secondary);background:var(--bg3);border-radius:12px;border:1px dashed var(--card-border)}
.music-subgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.music-now{display:grid;grid-template-columns:86px 1fr;gap:12px;align-items:center}
.music-now-cover{width:86px;height:86px;border-radius:12px;object-fit:cover;border:1px solid var(--card-border)}
.music-now-title{font-size:1rem;font-weight:800;color:var(--text)}
.music-now-sub{font-size:.78rem;color:var(--text-secondary);margin-top:2px}
.music-controls{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:10px}
.music-btn{padding:7px 11px;border-radius:9px;background:var(--bg4);border:1px solid var(--card-border);color:var(--text-secondary);font-size:.74rem;font-weight:700}
.music-btn:hover{border-color:rgba(var(--accent-rgb),.35);color:var(--accent)}
.music-bar{display:flex;align-items:center;gap:8px;margin-top:10px}
.music-range{width:100%;appearance:none;height:5px;background:var(--bg5);border-radius:4px}
.music-range::-webkit-slider-thumb{appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent)}
.music-time{font-size:.7rem;color:var(--text-secondary);min-width:34px}
.music-volume{display:flex;align-items:center;gap:8px;margin-top:6px}
.music-vol-label{font-size:.72rem;color:var(--text-secondary)}
.lyrics-wrap{height:560px;overflow:auto;background:linear-gradient(to bottom,rgba(var(--accent-rgb),.05),transparent 22%,transparent 78%,rgba(var(--accent-rgb),.05));border:1px solid var(--card-border);border-radius:12px;padding:26px 16px}
.lyrics-line{font-size:1rem;line-height:1.85;color:var(--text-dim);text-align:center;transition:all .28s}
.lyrics-line.active{color:var(--text);font-size:1.12rem;font-weight:700;text-shadow:0 0 18px rgba(var(--accent-rgb),.25)}
.lyrics-line.dim{color:var(--text-secondary)}
@media (max-width:980px){.music-layout{grid-template-columns:1fr}.lyrics-wrap{height:330px}.music-subgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="particles-js"></div>
<div id="nav-ph"></div>
<main class="music-page container">
  <h1 class="music-title">Music</h1>
  <div class="music-layout">
    <section class="music-panel">
      <div class="music-search-wrap">
        <input id="music-search" class="music-search" type="search" placeholder="Search songs, artists, albums">
      </div>
      <div id="music-search-status" class="music-search-status"></div>
      <div id="music-search-results" class="music-track-list"></div>
      <div class="music-subgrid">
        <div>
          <div class="section-header"><h2 class="section-title">Playlist</h2></div>
          <div id="music-playlist-results" class="music-track-list" style="max-height:260px"></div>
        </div>
        <div>
          <div class="section-header"><h2 class="section-title">Queue</h2></div>
          <div id="music-queue-results" class="music-track-list" style="max-height:260px"></div>
        </div>
      </div>
    </section>
    <aside class="music-panel">
      <div class="music-now">
        <img id="music-now-cover" class="music-now-cover" alt="Now playing cover">
        <div>
          <div id="music-now-title" class="music-now-title">Nothing playing</div>
          <div id="music-now-sub" class="music-now-sub">Search and play a track</div>
          <button id="music-now-fav" class="music-btn" type="button">Favorite</button>
        </div>
      </div>
      <div class="music-controls">
        <button id="music-prev" class="music-btn" type="button">Prev</button>
        <button id="music-playpause" class="music-btn" type="button">Play</button>
        <button id="music-next" class="music-btn" type="button">Next</button>
        <button id="music-repeat" class="music-btn" type="button">Repeat: off</button>
      </div>
      <div class="music-bar">
        <span id="music-time-now" class="music-time">0:00</span>
        <input id="music-progress" class="music-range" type="range" min="0" max="100" value="0">
        <span id="music-time-total" class="music-time">0:00</span>
      </div>
      <div class="music-volume">
        <span class="music-vol-label">Volume</span>
        <input id="music-volume" class="music-range" type="range" min="0" max="100" value="80">
        <span id="music-volume-val" class="music-time">80%</span>
      </div>
      <div class="section-header" style="margin-top:14px"><h2 class="section-title">Lyrics</h2></div>
      <div id="music-lyrics" class="lyrics-wrap"></div>
    </aside>
  </div>
  <audio id="music-audio" preload="metadata"></audio>
</main>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script src="js/music.js"></script>
<script>
document.getElementById('nav-ph').innerHTML = VApp.navHTML('music');
VCloak.initCloak(); VApp.initPanic(); VApp.initParticles();
const dtEl = document.getElementById('nav-datetime'); if (dtEl) VApp.startDatetime(dtEl);
VMusic.init();
</script>
</body>
</html>
