<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games — Vispora</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/cloak.js"></script>
  <script src="js/search.js"></script>
  <script src="js/app.js"></script>
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="games-page page-enter container" role="main">
    <div class="games-page-header">
      <h1 class="games-page-title">GAME LIBRARY</h1>
      <p class="games-page-sub">Browse, search and play your favourite games</p>
    </div>

    <div class="games-filters" role="search">
      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input type="search" 
               class="search-input" 
               id="search-input" 
               placeholder="Search games, authors, genres…" 
               aria-label="Search games"
               autocomplete="off"
               spellcheck="false">
      </div>

      <div class="games-filter-row">
        <div class="filter-tabs" role="tablist" aria-label="Game categories">
          <button class="filter-tab active" data-category="all" role="tab" aria-selected="true">All</button>
          <button class="filter-tab" data-category="web" role="tab" aria-selected="false">Web</button>
          <button class="filter-tab" data-category="ports" role="tab" aria-selected="false">Ports</button>
          <button class="filter-tab" data-category="flash" role="tab" aria-selected="false">Flash</button>
        </div>
        <select class="genre-select" id="genre-select" aria-label="Filter by genre">
          <option value="all">All Genres</option>
        </select>
      </div>
    </div>

    <div class="games-count" id="games-count" aria-live="polite"></div>

    <div class="game-grid" id="game-grid" role="list" aria-label="Games grid">
      <!-- Skeletons -->
      ${Array(20).fill(0).map(() => '<div class="skeleton" style="aspect-ratio:1;border-radius:12px" role="listitem"></div>').join('')}
    </div>
  </main>

  <div id="toast-container" role="status" aria-live="polite"></div>

  <script>
    // Nav
    document.getElementById('nav-placeholder').innerHTML = VApp.navHTML('games');
    VCloak.initCloak();
    VApp.initPanicBtn();

    const dtEl = document.getElementById('nav-datetime');
    if (dtEl) VApp.startDatetime(dtEl);

    const grid = document.getElementById('game-grid');
    const searchInput = document.getElementById('search-input');
    const genreSelect = document.getElementById('genre-select');
    const gamesCount  = document.getElementById('games-count');
    let allGames = [];
    let renderTimer = null;

    async function init() {
      allGames = await VApp.loadGames();
      VSearch.setGames(allGames);

      // Populate genre dropdown
      const genres = VSearch.getAllGenres(allGames);
      genres.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g;
        opt.textContent = g.charAt(0).toUpperCase() + g.slice(1);
        genreSelect.appendChild(opt);
      });

      renderGames();

      // Focus search with Ctrl+K
      document.addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
          e.preventDefault();
          searchInput.focus();
          searchInput.select();
        }
      });
    }

    function renderGames() {
      const results = VSearch.getFiltered();
      updateCount(results.length);

      if (!results.length) {
        grid.innerHTML = `
          <div class="no-results" style="grid-column:1/-1">
            <div style="font-size:3rem;margin-bottom:12px">🔍</div>
            <div class="no-results-title">No games found</div>
            <p style="color:var(--text-secondary);font-size:0.88rem;margin-top:8px">
              Try a different search term or clear your filters.
            </p>
            <button class="btn btn-secondary" style="margin-top:16px" id="clear-filters-btn">Clear Filters</button>
          </div>
        `;
        document.getElementById('clear-filters-btn')?.addEventListener('click', clearFilters);
        return;
      }

      grid.innerHTML = results.map((g, i) => `
        <div role="listitem" style="animation-delay:${Math.min(i * 30, 600)}ms">
          ${VApp.createGameCardHTML(g)}
        </div>
      `).join('');

      VApp.initStarDelegation(grid);

      // Keyboard nav: Enter to open
      grid.querySelectorAll('.game-card').forEach(card => {
        card.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            window.location.href = card.href;
          }
        });
      });
    }

    function updateCount(n) {
      gamesCount.innerHTML = `Showing <span>${n.toLocaleString()}</span> game${n !== 1 ? 's' : ''}`;
    }

    function clearFilters() {
      searchInput.value = '';
      genreSelect.value = 'all';
      document.querySelectorAll('.filter-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.category === 'all');
        t.setAttribute('aria-selected', t.dataset.category === 'all');
      });
      VSearch.search('');
      VSearch.setCategory('all');
      VSearch.setGenre('all');
      renderGames();
    }

    // Search
    searchInput.addEventListener('input', () => {
      clearTimeout(renderTimer);
      renderTimer = setTimeout(() => {
        VSearch.search(searchInput.value);
        renderGames();
      }, 180);
    });

    // Category tabs
    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => {
          t.classList.remove('active');
          t.setAttribute('aria-selected', 'false');
        });
        tab.classList.add('active');
        tab.setAttribute('aria-selected', 'true');
        VSearch.setCategory(tab.dataset.category);
        renderGames();
      });
    });

    // Genre
    genreSelect.addEventListener('change', () => {
      VSearch.setGenre(genreSelect.value);
      renderGames();
    });

    init();
  </script>
</body>
</html>
