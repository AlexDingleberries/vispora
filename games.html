<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Games — vispora</title>
<link rel="stylesheet" href="/css/global.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/pages.css">
<script src="/js/storage.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/cloak.js"></script>
<script src="/js/search.js"></script>
<script src="/js/app.js"></script>
</head>
<body>
<div id="particles-js"></div>
<div id="nav-ph"></div>
<main class="games-page page-enter container">
  <div class="games-page-header">
    <h1 class="games-page-title">Game Library</h1>
    <p class="games-page-sub">Browse and play from our full collection</p>
  </div>
  <div class="games-filters">
    <div class="search-wrap">
      <span class="search-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input type="search" class="search-input" id="search-input" placeholder="Search games, authors, genres…" autocomplete="off" spellcheck="false" aria-label="Search games">
    </div>
    <div class="games-filter-row">
      <div class="filter-tabs" id="cat-tabs">
        <button class="filter-tab active" data-cat="all">All</button>
        <button class="filter-tab" data-cat="web">Web</button>
        <button class="filter-tab" data-cat="ports">Ports</button>
        <button class="filter-tab" data-cat="flash">Flash</button>
      </div>
      <select class="genre-select" id="genre-select" aria-label="Filter by genre"><option value="all">All Genres</option></select>
    </div>
  </div>
  <div class="games-count" id="games-count"></div>
  <div class="game-grid" id="game-grid" role="list">
    <div class="skeleton" style="aspect-ratio:1;border-radius:10px"></div>
  </div>
</main>
<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script>
document.getElementById('nav-ph').innerHTML=VApp.navHTML('games');
VCloak.initCloak();VApp.initPanic();VApp.initParticles();
const dtEl=document.getElementById('nav-datetime');if(dtEl)VApp.startDatetime(dtEl);

const grid=document.getElementById('game-grid');
const searchIn=document.getElementById('search-input');
const genreSel=document.getElementById('genre-select');
const countEl=document.getElementById('games-count');
let timer=null;

async function init(){
  const games=await VApp.loadGames();
  VSearch.setGames(games);
  VSearch.getAllGenres(games).forEach(g=>{
    const o=document.createElement('option');
    o.value=g;o.textContent=g.charAt(0).toUpperCase()+g.slice(1).replace('-',' ');
    genreSel.appendChild(o);
  });
  render();
  document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();searchIn.focus();searchIn.select();}});
}

function render(){
  const results=VSearch.getFiltered().sort((a,b)=>a.name.localeCompare(b.name));
  countEl.innerHTML=`Showing <span>${results.length.toLocaleString()}</span> game${results.length!==1?'s':''}`;
  if(!results.length){
    grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:80px 20px">
      <div style="font-size:2.5rem;margin-bottom:12px">🔍</div>
      <div class="no-results-title">No games found</div>
      <p style="color:var(--text-secondary);margin-top:6px;font-size:0.875rem">Try a different search or clear filters</p>
      <button class="btn btn-secondary" style="margin-top:16px" id="clear-btn">Clear Filters</button>
    </div>`;
    document.getElementById('clear-btn')?.addEventListener('click',clearFilters);
    return;
  }
  grid.innerHTML=results.map((g,i)=>`<div style="animation-delay:${Math.min(i*25,500)}ms">${VApp.makeCard(g)}</div>`).join('');
  VApp.initStars(grid);
  grid.querySelectorAll('.game-card').forEach(c=>{
    c.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();if(c.href)window.location.href=c.href;}});
  });
}

function clearFilters(){
  searchIn.value='';genreSel.value='all';
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.toggle('active',t.dataset.cat==='all'));
  VSearch.search('');VSearch.setCategory('all');VSearch.setGenre('all');render();
}

searchIn.addEventListener('input',()=>{clearTimeout(timer);timer=setTimeout(()=>{VSearch.search(searchIn.value);render();},180);});
document.getElementById('cat-tabs').addEventListener('click',e=>{
  const btn=e.target.closest('.filter-tab');if(!btn)return;
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');VSearch.setCategory(btn.dataset.cat);render();
});
genreSel.addEventListener('change',()=>{VSearch.setGenre(genreSel.value);render();});
init();
</script>
</body></html>
