<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>vispora</title>
<link rel="stylesheet" href="/css/global.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/pages.css">
<script src="/js/storage.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/cloak.js"></script>
</head>
<body>
<div id="particles-js"></div>
<main class="launcher-page page-enter">
  <div class="launcher-logo">vispora</div>
  <br>
  <button class="launcher-launch-btn" id="launch-btn" type="button">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    LAUNCH
  </button>
  <div class="launcher-settings-panel">
    <div class="launcher-settings-title">Launch Options</div>
    <div class="settings-row">
      <div><div class="settings-label">Cloaking Mode</div><div class="settings-label-desc">Tab disguise when active</div></div>
      <select class="settings-select" id="cloak-mode-select">
        <option value="google">Google Drive</option>
        <option value="custom">Custom URL</option>
        <option value="none">None</option>
      </select>
    </div>
    <div class="settings-row" id="custom-url-row" style="display:none">
      <div style="flex:1"><div class="settings-label">Custom URL</div>
        <input type="url" class="settings-input" id="custom-url-input" placeholder="https://classroom.google.com"></div>
    </div>
  </div>
</main>
<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script src="js/app.js"></script>
<script>
VCloak.initCloak();
VApp.initParticles();

const modeSelect=document.getElementById('cloak-mode-select');
const customRow=document.getElementById('custom-url-row');
const customIn=document.getElementById('custom-url-input');
const autoTog=document.getElementById('auto-cloak-toggle');
const pkBtn=document.getElementById('panic-key-btn');
const pkLbl=document.getElementById('panic-key-label');

modeSelect.value=VStorage.getCloakMode();
customIn.value=VStorage.getCloakUrl()||'';
customRow.style.display=modeSelect.value==='custom'?'':'none';

modeSelect.onchange=()=>{VStorage.setCloakMode(modeSelect.value);customRow.style.display=modeSelect.value==='custom'?'':'none';};
customIn.oninput=()=>VStorage.setCloakUrl(customIn.value);

let listening=false;
function startListen(){
  if(listening)return;listening=true;pkBtn.classList.add('listening');pkLbl.textContent='Press key…';
  function onKey(e){e.preventDefault();const key=e.code;VStorage.setPanicKey(key);pkBtn.classList.remove('listening');pkLbl.textContent=key.replace('Key','');listening=false;document.removeEventListener('keydown',onKey);}
  document.addEventListener('keydown',onKey);
}
document.getElementById('launch-btn').onclick=()=>{var win = window.open(); win.document.body.style.margin = '0';win.document.body.style.height = '100vh';var iframe = win.document.createElement('iframe');iframe.style.border = 'none';iframe.style.width = '100%'; iframe.style.height = '100%';iframe.style.margin = '0'; iframe.src = 'home.html';win.document.body.appendChild(iframe);;const m = VStorage.getCloakMode();const cu = VStorage.getCloakUrl();if (m === 'google') {window.location.replace(CLOAK_TARGETS.google.url);} else if (m === 'custom' && cu) {window.location.replace(cu);}};
</script>
</body></html>
