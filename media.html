<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Playing — vispora</title>
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/pages.css">
<script src="js/storage.js"></script>
<script src="js/theme.js"></script>
<script src="js/cloak.js"></script>
<script src="js/app.js"></script>
<script src="js/media.js"></script>
<style>
/* Watch time bar */
.watch-time-bar {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.8rem; color: var(--text-secondary); margin-top: 2px;
}
.watch-time-bar span.wt-val { color: var(--accent); font-weight: 700; }

/* Session time live display */
.session-time-bar {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.78rem; color: var(--text-secondary); margin-top: 4px;
}
.session-time-bar .st-val { color: #4caf7d; font-weight: 700; }

/* Progress bar from postMessage */
.player-progress-bar {
  height: 3px; background: var(--bg5); border-radius: 2px;
  margin-top: 8px; overflow: hidden; display: none;
}
.player-progress-fill {
  height: 100%; background: var(--accent);
  border-radius: 2px; transition: width 1s linear;
}
.player-progress-label {
  display: flex; justify-content: space-between;
  font-size: 0.68rem; color: var(--text-secondary); margin-top: 3px;
}

/* Episode current badge */
.ep-current-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 0.75rem; font-weight: 700;
  background: rgba(var(--accent-rgb),0.12);
  border: 1px solid rgba(var(--accent-rgb),0.25);
  color: var(--accent); padding: 3px 10px; border-radius: 100px; margin-bottom: 4px;
}

/* Sub / Dub picker */
.subdub-picker {
  display: flex; align-items: center; gap: 6px; margin-top: 8px;
}
.subdub-btn {
  padding: 5px 14px; border-radius: var(--radius-sm); font-size: 0.78rem; font-weight: 700;
  border: 1px solid var(--card-border); background: var(--bg4); color: var(--text-secondary);
  cursor: pointer; transition: all 0.15s;
}
.subdub-btn.active {
  background: var(--accent); color: var(--text-inv);
  border-color: var(--accent); box-shadow: 0 0 12px rgba(var(--accent-rgb),0.25);
}
.subdub-btn:not(.active):hover { border-color: rgba(var(--accent-rgb),0.4); color: var(--accent); }
.subdub-label { font-size: 0.72rem; color: var(--text-secondary); font-weight: 600; }

/* Related anime seasons section */
.related-section { margin-top: 32px; }
.related-section .section-title { font-size: 1rem; font-weight: 700; margin-bottom: 14px; }
.related-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px;
}
.related-card {
  position: relative; border-radius: var(--radius); overflow: hidden;
  border: 1px solid var(--card-border); background: var(--card-bg);
  transition: transform 0.18s, border-color 0.18s; cursor: pointer;
  text-decoration: none; display: block;
}
.related-card:hover { transform: translateY(-3px); border-color: rgba(var(--accent-rgb),0.4); }
.related-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
.related-card-body { padding: 8px 10px; }
.related-card-type { font-size: 0.64rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
.related-card-title { font-size: 0.78rem; font-weight: 600; color: var(--text); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
</style>
</head>
<body>
<div id="particles-js"></div>
<div id="nav-ph"></div>
<main class="media-player-page page-enter container">

  <!-- Breadcrumb -->
  <nav class="breadcrumb">
    <a href="home.html">Home</a><span class="breadcrumb-sep">›</span>
    <a href="#" id="bc-type">Media</a><span class="breadcrumb-sep">›</span>
    <span id="bc-title">Loading…</span>
  </nav>

  <!-- ===== PLAYER AREA ===== -->
  <div class="media-player-area" id="player-area">
    <div class="player-iframe-wrap" id="iframe-wrap">
      <div class="player-error" id="player-error" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <strong>Failed to load</strong>
        <p id="error-link"></p>
      </div>
      <iframe id="media-frame" title="Media Player" allowfullscreen
        allow="autoplay; fullscreen; pointer-lock; encrypted-media"></iframe>
    </div>

    <!-- Progress bar (populated by postMessage) -->
    <div id="player-progress-wrap" style="margin-top:8px;display:none">
      <div class="player-progress-bar" id="player-progress-bar" style="display:block">
        <div class="player-progress-fill" id="player-progress-fill" style="width:0%"></div>
      </div>
      <div class="player-progress-label">
        <span id="prog-current">0:00</span>
        <span id="prog-percent">0%</span>
        <span id="prog-duration">0:00</span>
      </div>
    </div>

    <!-- Episode picker (TV + Anime) -->
    <div class="tv-episode-picker" id="episode-picker" style="display:none">
      <div class="episode-picker-header">
        <div class="episode-picker-header-label" id="ep-picker-label">Episodes</div>
        <select id="season-select" aria-label="Select season" style="display:none"></select>
      </div>
      <div class="episode-picker-list" id="episode-list">
        <div style="padding:24px;text-align:center;color:var(--text-secondary);font-size:0.8rem">Loading…</div>
      </div>
    </div>
  </div>

  <br><br>

  <div class="media-hero" id="media-hero">
    <div class="media-hero-backdrop" id="hero-backdrop"></div>
    <div class="media-hero-backdrop-gradient"></div>
    <div class="media-hero-content">
      <!-- Poster -->
      <div class="media-hero-poster" id="hero-poster-wrap">
        <div class="media-hero-poster-placeholder">🎬</div>
      </div>
      <!-- Info -->
      <div class="media-hero-info">
        <div class="media-hero-badge" id="hero-badge">Loading…</div>
        <h1 class="media-hero-title" id="media-title">Loading…</h1>
        <div class="media-hero-tagline" id="media-tagline"></div>
        <div id="ep-current-display"></div>

        <!-- Sub/Dub picker (anime only) -->
        <div class="subdub-picker" id="subdub-picker" style="display:none">
          <span class="subdub-label">Audio:</span>
          <button class="subdub-btn active" id="btn-sub" type="button">SUB</button>
          <button class="subdub-btn" id="btn-dub" type="button">DUB</button>
        </div>

        <div class="media-hero-meta" id="media-meta"></div>
        <div class="media-hero-genres" id="media-genres"></div>

        <!-- Watch time -->
        <div class="watch-time-bar" id="watch-time-bar" style="display:none">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Total watched: <span class="wt-val" id="watch-time-val">—</span>
        </div>
        <!-- Session time live -->
        <div class="session-time-bar" id="session-time-bar" style="display:none">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#4caf7d" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          This session: <span class="st-val" id="session-time-val">0:00</span>
        </div>

        <p class="media-hero-overview" id="media-overview"></p>
        <div class="media-hero-cast" id="cast-row"></div>
        <div class="media-hero-actions">
          <span id="est-done-display" style="display:none;font-size:0.78rem;font-weight:600;color:var(--accent)"></span>
          <button class="btn btn-primary" id="btn-play-scroll" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Play
          </button>
          <button class="btn-icon" id="btn-fav" title="Favorite" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </button>
          <button class="btn-icon" id="btn-reload-hero" title="Reload" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
          </button>
          <button class="btn btn-secondary" id="back-btn" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            Return
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- RECOMMENDATIONS -->
  <section class="recs-section" id="recs-section" style="display:none">
    <div class="section-header">
      <h2 class="section-title">You Might Also Like</h2>
    </div>
    <div class="media-row" id="recs-row"></div>
  </section>

  <!-- RELATED / OTHER SEASONS (anime) -->
  <section class="related-section" id="related-section" style="display:none">
    <div class="section-header">
      <h2 class="section-title" id="related-title">Related &amp; Other Seasons</h2>
    </div>
    <div class="related-grid" id="related-grid"></div>
  </section>

</main>
<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script>
document.getElementById('nav-ph').innerHTML = VApp.navHTML('');
VCloak.initCloak(); VApp.initPanic(); VApp.initParticles();
const dtEl = document.getElementById('nav-datetime'); if (dtEl) VApp.startDatetime(dtEl);

const params = new URLSearchParams(location.search);
const mediaType = params.get('type');
const mediaId   = params.get('id');
if (!mediaType || !mediaId) { location.href = 'home.html'; }

let mediaData = null;
let sessionStart = null, sessionMs = 0, sessionTimer = null, sessionDisplayTimer = null;
let isFs = false;
let currentSeason = 1, currentEpisode = 1;
const seasonCache = {};
let _runtimeMs = 0;
let isDubbed = false; // anime sub/dub state

/* ================================================================
   postMessage — Videasy player progress tracking
   ================================================================ */
window.addEventListener('message', function(event) {
  let data = null;
  try {
    data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
  } catch { return; }
  if (!data) return;

  /* Videasy sends various event shapes; handle both */
  const ct  = data.currentTime ?? data.current_time ?? null;
  const dur = data.duration ?? null;
  const evType = data.event || data.type || '';

  if (ct !== null && dur && dur > 0) {
    const percent = Math.round((ct / dur) * 100);
    /* Update progress bar */
    const wrap = document.getElementById('player-progress-wrap');
    const fill = document.getElementById('player-progress-fill');
    const curEl = document.getElementById('prog-current');
    const durEl = document.getElementById('prog-duration');
    const pctEl = document.getElementById('prog-percent');
    if (wrap) { wrap.style.display = ''; }
    if (fill)  { fill.style.width = percent + '%'; }
    if (curEl) { curEl.textContent = fmtSecs(ct); }
    if (durEl) { durEl.textContent = fmtSecs(dur); }
    if (pctEl) { pctEl.textContent = percent + '%'; }
    /* Save to storage */
    if (mediaData) {
      VStorage.setMediaProgress(mediaId, mediaType, ct, dur);
    }
  }
});

function fmtSecs(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

/* ================================================================
   Watch time
   ================================================================ */
function updateWatchTimeDisplay() {
  const total = VStorage.getMediaWatchTime(mediaId, mediaType);
  const formatted = VStorage.formatTime(total);
  const bar = document.getElementById('watch-time-bar');
  const val = document.getElementById('watch-time-val');
  if (formatted) { bar.style.display = ''; val.textContent = formatted; }
}

/* ================================================================
   Session tracking
   ================================================================ */
function startSession() {
  if (sessionStart) return;
  sessionStart = Date.now();
  sessionTimer = setInterval(tickEstimate, 1000);
  sessionDisplayTimer = setInterval(tickSessionDisplay, 1000);
  document.getElementById('session-time-bar').style.display = '';
  tickSessionDisplay();
}

function tickSessionDisplay() {
  const elapsed = sessionStart ? (Date.now() - sessionStart + sessionMs) : sessionMs;
  const el = document.getElementById('session-time-val');
  if (el) el.textContent = fmtSecs(Math.floor(elapsed / 1000));
}

function tickEstimate() {
  if (!sessionStart || !_runtimeMs) return;
  const el = document.getElementById('est-done-display');
  if (!el) return;
  const elapsed = Date.now() - sessionStart + sessionMs;
  const remaining = _runtimeMs - elapsed;
  if (remaining > 0) {
    const estEnd = new Date(Date.now() + remaining);
    el.textContent = 'Est. Finish: ' + estEnd.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    el.style.display = '';
  }
}

function saveSession() {
  if (!sessionStart) return;
  const e = Date.now() - sessionStart;
  sessionMs += e; sessionStart = null;
  if (e > 2000 && mediaData) {
    VStorage.addToMediaHistory(mediaData, mediaType);
    VStorage.addMediaWatchTime(mediaId, mediaType, e);
    updateWatchTimeDisplay();
  }
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    saveSession();
    clearInterval(sessionTimer); clearInterval(sessionDisplayTimer);
    sessionTimer = null; sessionDisplayTimer = null;
  } else if (mediaData) {
    sessionStart = Date.now();
    sessionTimer = setInterval(tickEstimate, 1000);
    sessionDisplayTimer = setInterval(tickSessionDisplay, 1000);
    tickEstimate(); tickSessionDisplay();
  }
});
window.addEventListener('beforeunload', saveSession);
window.addEventListener('pagehide', saveSession);

/* ================================================================
   Favorite
   ================================================================ */
function updateFavBtn() {
  if (!mediaData) return;
  const btn = document.getElementById('btn-fav');
  const isFav = VStorage.isMediaFavorite(mediaData.id, mediaType);
  btn.style.color = isFav ? 'var(--accent)' : '';
  btn.title = isFav ? 'Remove from favorites' : 'Add to favorites';
  btn.innerHTML = isFav
    ? `<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" width="16" height="16"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
}
document.getElementById('btn-fav').onclick = () => {
  if (!mediaData) return;
  const added = VStorage.toggleMediaFavorite(mediaData.id, mediaType);
  updateFavBtn();
  VApp.showToast(added ? 'Added to favorites' : 'Removed from favorites');
};

document.getElementById('btn-reload-hero').onclick = () => {
  const f = document.getElementById('media-frame'); f.src = f.src; VApp.showToast('Reloaded');
};
document.getElementById('btn-play-scroll').onclick = () => {
  document.getElementById('iframe-wrap').scrollIntoView({ behavior:'smooth', block:'start' });
};
document.getElementById('back-btn').onclick = () => {
  saveSession(); clearInterval(sessionTimer); clearInterval(sessionDisplayTimer);
  const backMap = { movie:'movies.html', tv:'tv.html', anime:'anime.html' };
  window.location.href = backMap[mediaType] || 'home.html';
};

/* ================================================================
   Sub / Dub picker
   ================================================================ */
document.getElementById('btn-sub').onclick = () => {
  if (isDubbed) { isDubbed = false; applySubDub(); }
};
document.getElementById('btn-dub').onclick = () => {
  if (!isDubbed) { isDubbed = true; applySubDub(); }
};
function applySubDub() {
  document.getElementById('btn-sub').classList.toggle('active', !isDubbed);
  document.getElementById('btn-dub').classList.toggle('active', isDubbed);
  if (mediaData && mediaType === 'anime') {
    loadAnimeEpisodeIntoFrame(mediaData.id, currentEpisode);
    VApp.showToast(isDubbed ? 'Switched to Dub' : 'Switched to Sub');
  }
}
function animePlayerUrlWithDub(id, ep) {
  const acc = VMedia.getAccentHex();
  const base = `https://player.videasy.net/anime/${id}/${ep}?color=${acc}`;
  return isDubbed ? base + '&dubbed=true' : base;
}

/* ================================================================
   Hero visuals
   ================================================================ */
function setHeroVisuals(posterSrc, backdropSrc) {
  if (backdropSrc) document.getElementById('hero-backdrop').style.backgroundImage = `url(${backdropSrc})`;
  const pw = document.getElementById('hero-poster-wrap');
  if (posterSrc) pw.innerHTML = `<img src="${VApp.esc(posterSrc)}" alt="poster" style="width:100%;display:block;">`;
}

function populateHero(data, type) {
  const title = data.title || data.name;
  document.title = `${title} — vispora`;
  document.getElementById('bc-title').textContent = title;
  document.getElementById('media-title').textContent = title;
  document.getElementById('hero-badge').textContent = type === 'movie' ? '🎬 Movie' : '📺 TV Show';
  if (data.tagline) document.getElementById('media-tagline').textContent = data.tagline;

  const year = (data.release_date || data.first_air_date || '').slice(0,4);
  const rating = data.vote_average ? Number(data.vote_average).toFixed(1) : '';
  const runtime = data.runtime ? `${data.runtime}m` :
    data.episode_run_time?.length ? `${data.episode_run_time[0]}m/ep` : '';
  const seasons = data.number_of_seasons;

  const chips = [];
  if (year) chips.push(`<span class="media-hero-meta-chip">${VApp.esc(year)}</span>`);
  if (rating) chips.push(`<span class="media-hero-rating">★ ${VApp.esc(rating)}</span>`);
  if (runtime) chips.push(`<span class="media-hero-meta-chip">${VApp.esc(runtime)}</span>`);
  if (seasons) chips.push(`<span class="media-hero-meta-chip">${seasons} season${seasons>1?'s':''}</span>`);
  document.getElementById('media-meta').innerHTML = chips.join('');

  const genres = data.genres || [];
  document.getElementById('media-genres').innerHTML =
    genres.slice(0,5).map(g => `<span class="media-hero-genre">${VApp.esc(g.name)}</span>`).join('');

  document.getElementById('media-overview').textContent = data.overview || 'No description available.';
  if (data.runtime) _runtimeMs = data.runtime * 60 * 1000;
  else if (data.episode_run_time?.length) _runtimeMs = data.episode_run_time[0] * 60 * 1000;
  else _runtimeMs = 0;

  const posterSrc = data.poster_path ? VMedia.posterUrl(data.poster_path,'w342') : '';
  const backSrc   = data.backdrop_path ? VMedia.backdropUrl(data.backdrop_path,'w1280') : '';
  setHeroVisuals(posterSrc, backSrc);
  updateFavBtn(); updateWatchTimeDisplay();

  /* Restore postMessage progress bar if available */
  const prog = VStorage.getMediaProgress(mediaId, mediaType);
  if (prog && prog.duration > 0) {
    document.getElementById('player-progress-wrap').style.display = '';
    document.getElementById('player-progress-fill').style.width = prog.percent + '%';
    document.getElementById('prog-current').textContent = fmtSecs(prog.currentTime);
    document.getElementById('prog-duration').textContent = fmtSecs(prog.duration);
    document.getElementById('prog-percent').textContent = prog.percent + '%';
  }

  startSession();
}

function populateAnimeHero(data) {
  const title = VMedia.animeTitle(data);
  document.title = `${title} — vispora`;
  document.getElementById('bc-title').textContent = title;
  document.getElementById('media-title').textContent = title;
  document.getElementById('hero-badge').textContent = '🎌 Anime';

  const studio = data.studios?.nodes?.[0]?.name || '';
  if (studio) document.getElementById('media-tagline').textContent = studio;

  const year = data.seasonYear || '';
  const score = data.averageScore ? (data.averageScore/10).toFixed(1) : '';
  const epCount = data.episodes ? `${data.episodes} eps` : '';
  const status = data.status === 'RELEASING' ? 'Airing' : data.status === 'FINISHED' ? 'Finished' : (data.status||'');

  const chips = [];
  if (year) chips.push(`<span class="media-hero-meta-chip">${VApp.esc(String(year))}</span>`);
  if (score) chips.push(`<span class="media-hero-rating">★ ${VApp.esc(score)}</span>`);
  if (epCount) chips.push(`<span class="media-hero-meta-chip">${VApp.esc(epCount)}</span>`);
  if (status) chips.push(`<span class="media-hero-meta-chip">${VApp.esc(status)}</span>`);
  document.getElementById('media-meta').innerHTML = chips.join('');

  const genres = data.genres || [];
  document.getElementById('media-genres').innerHTML =
    genres.slice(0,5).map(g => `<span class="media-hero-genre">${VApp.esc(g)}</span>`).join('');

  const rawDesc = data.description || 'No description available.';
  document.getElementById('media-overview').textContent = rawDesc.replace(/<[^>]+>/g,'').replace(/&[a-z]+;/gi,' ');

  _runtimeMs = 24 * 60 * 1000;

  const posterSrc = data.coverImage?.extraLarge || data.coverImage?.large || '';
  const backSrc   = data.bannerImage || '';
  setHeroVisuals(posterSrc, backSrc);
  updateFavBtn(); updateWatchTimeDisplay();

  /* Show sub/dub picker */
  document.getElementById('subdub-picker').style.display = '';

  startSession();
}

/* ================================================================
   Cast
   ================================================================ */
async function populateCast(id, type) {
  try {
    if (type === 'anime') {
      const data = await VMedia.getAnimeById(id);
      const chars = (data.characters?.nodes || []).slice(0,10);
      if (!chars.length) return;
      document.getElementById('cast-row').innerHTML = chars.map(c => `
        <div class="cast-member">
          <img class="cast-photo" src="${VApp.esc(c.image?.medium||'')}" alt="${VApp.esc(c.name?.full||'')}" loading="lazy" onerror="this.style.display='none'">
          <div class="cast-name">${VApp.esc(c.name?.full||'')}</div>
          <div class="cast-char">Character</div>
        </div>`).join('');
      return;
    }
    const endpoint = type === 'movie' ? `/movie/${id}/credits` : `/tv/${id}/credits`;
    const data = await VMedia.tmdbFetch(endpoint);
    const cast = (data.cast || []).filter(c => c.profile_path).slice(0,10);
    if (!cast.length) return;
    document.getElementById('cast-row').innerHTML = cast.map(c => `
      <div class="cast-member">
        <img class="cast-photo" src="${VMedia.posterUrl(c.profile_path,'w185')}" alt="${VApp.esc(c.name)}" loading="lazy" onerror="this.style.display='none'">
        <div class="cast-name">${VApp.esc(c.name)}</div>
        <div class="cast-char">${VApp.esc(c.character||'')}</div>
      </div>`).join('');
  } catch (e) { console.warn('Cast fetch failed:', e); }
}

/* ================================================================
   Recommendations
   ================================================================ */
async function loadRecs(id, type) {
  try {
    if (type === 'anime') {
      const data = await VMedia.getAnimeById(id);
      const recs = (data.recommendations?.nodes || [])
        .map(n => n.mediaRecommendation).filter(Boolean).filter(a => a.coverImage?.large).slice(0,14);
      if (!recs.length) return;
      document.getElementById('recs-section').style.display = '';
      const row = document.getElementById('recs-row');
      row.innerHTML = recs.map(a => VMedia.makeAnimeCard(a)).join('');
      VMedia.initMediaStars(row);
      return;
    }
    const endpoint = type === 'movie' ? `/movie/${id}/recommendations` : `/tv/${id}/recommendations`;
    const data = await VMedia.tmdbFetch(endpoint, { page:1 });
    const results = (data.results || []).filter(r => r.poster_path).slice(0,14);
    if (!results.length) return;
    document.getElementById('recs-section').style.display = '';
    const row = document.getElementById('recs-row');
    row.innerHTML = type === 'movie'
      ? results.map(m => VMedia.makeMovieCard(m)).join('')
      : results.map(s => VMedia.makeTVCard(s)).join('');
    VMedia.initMediaStars(row);
  } catch (e) { console.warn('Recs failed:', e); }
}

/* ================================================================
   Related / Other Seasons (Anime only — AniList relations)
   ================================================================ */
async function loadAnimeRelated(id) {
  try {
    const relData = await VMedia.anilistFetch(`
      query($id:Int){Media(id:$id,type:ANIME){
        relations{
          edges{
            relationType(version:2)
            node{
              id type title{english romaji} coverImage{large}
              averageScore seasonYear status episodes
            }
          }
        }
      }}`, { id: Number(id) });

    const edges = (relData?.Media?.relations?.edges || [])
      .filter(e => e.node.type === 'ANIME' && e.node.coverImage?.large)
      .sort((a,b) => {
        const order = ['PREQUEL','SEQUEL','PARENT','SIDE_STORY','ALTERNATIVE','SPIN_OFF','OTHER'];
        return (order.indexOf(a.relationType) ?? 99) - (order.indexOf(b.relationType) ?? 99);
      });

    if (!edges.length) return;

    const section = document.getElementById('related-section');
    const grid = document.getElementById('related-grid');
    section.style.display = '';

    grid.innerHTML = edges.map(e => {
      const n = e.node;
      const title = n.title?.english || n.title?.romaji || 'Unknown';
      const typeLabel = e.relationType.replace(/_/g,' ');
      const year = n.seasonYear ? `(${n.seasonYear})` : '';
      const score = n.averageScore ? `★ ${(n.averageScore/10).toFixed(1)}` : '';
      return `<a href="media.html?type=anime&id=${n.id}" class="related-card">
        <img src="${VApp.esc(n.coverImage.large)}" alt="${VApp.esc(title)}" loading="lazy" onerror="this.style.display='none'">
        <div class="related-card-body">
          <div class="related-card-type">${VApp.esc(typeLabel)}</div>
          <div class="related-card-title">${VApp.esc(title)} ${VApp.esc(year)}</div>
          ${score?`<div style="font-size:0.68rem;color:var(--accent);margin-top:2px">${VApp.esc(score)}</div>`:''}
        </div>
      </a>`;
    }).join('');
  } catch (e) { console.warn('Related fetch failed:', e); }
}

/* ================================================================
   TV Episode loading
   ================================================================ */
function updateEpBadge(season, episode) {
  document.getElementById('ep-current-display').innerHTML =
    `<div class="ep-current-badge">📺 Season ${season} · Episode ${episode}</div>`;
}
function loadEpisodeIntoFrame(showId, season, episode) {
  const frame = document.getElementById('media-frame');
  const url = VMedia.tvPlayerUrl(showId, season, episode);
  frame.src = url; frame.style.display = 'block';
  currentSeason = season; currentEpisode = episode;
  VStorage.setTVProgress(showId, season, episode);
  VStorage.addToMediaHistory(mediaData, 'tv');
  updateEpBadge(season, episode);
  document.getElementById('season-select').value = season;
  if (seasonCache[season]) {
    const ep = seasonCache[season].find(e => e.episode_number === episode);
    if (ep && ep.runtime) _runtimeMs = ep.runtime * 60 * 1000;
  }
  document.querySelectorAll('.episode-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.season) === season && parseInt(b.dataset.ep) === episode);
  });
}

async function loadSeasonEpisodes(showId, seasonNum, activeEp) {
  const list = document.getElementById('episode-list');
  list.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text-secondary);font-size:0.8rem">Loading…</div>`;
  try {
    if (!seasonCache[seasonNum]) {
      const d = await VMedia.tmdbFetch(`/tv/${showId}/season/${seasonNum}`);
      seasonCache[seasonNum] = d.episodes || [];
    }
    const eps = seasonCache[seasonNum];
    if (!eps.length) { list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:0.8rem">No episodes</div>`; return; }
    list.innerHTML = eps.map(ep => `
      <button class="episode-btn${ep.episode_number===activeEp?' active':''}"
        data-ep="${ep.episode_number}" data-season="${seasonNum}" type="button">
        <span class="ep-number">E${ep.episode_number}</span>
        <span class="ep-title">${VApp.esc(ep.name||`Episode ${ep.episode_number}`)}</span>
      </button>`).join('');
    setTimeout(() => {
      const active = list.querySelector('.episode-btn.active');
      if (active) active.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }, 100);
    loadEpisodeIntoFrame(showId, seasonNum, activeEp);
  } catch (e) {
    list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:0.8rem">Failed to load episodes</div>`;
  }
}

document.getElementById('episode-list').addEventListener('click', e => {
  const btn = e.target.closest('.episode-btn');
  if (!btn || !mediaData) return;
  if (mediaType === 'tv') {
    loadEpisodeIntoFrame(mediaData.id, parseInt(btn.dataset.season), parseInt(btn.dataset.ep));
  } else if (mediaType === 'anime') {
    loadAnimeEpisodeIntoFrame(mediaData.id, parseInt(btn.dataset.ep));
  }
});

/* ================================================================
   Anime Episode loading
   ================================================================ */
function loadAnimeEpisodeIntoFrame(animeId, episode) {
  const frame = document.getElementById('media-frame');
  currentEpisode = episode;
  VStorage.setAnimeProgress(animeId, episode);
  VStorage.addToMediaHistory(mediaData, 'anime');
  frame.src = animePlayerUrlWithDub(animeId, episode);
  frame.style.display = 'block';
  /* Update episode badge */
  document.getElementById('ep-current-display').innerHTML =
    `<div class="ep-current-badge">🎌 Episode ${episode}${isDubbed?' · DUB':' · SUB'}</div>`;
  document.querySelectorAll('.episode-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.ep) === episode);
  });
  const activeBtn = document.querySelector(`.episode-btn[data-ep="${episode}"]`);
  if (activeBtn) activeBtn.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function buildAnimeEpisodePicker(animeId, totalEps, startEp) {
  if (!totalEps || totalEps < 1) return;
  const list = document.getElementById('episode-list');
  list.innerHTML = Array.from({ length: totalEps }, (_, i) => {
    const ep = i + 1;
    return `<button class="episode-btn${ep===startEp?' active':''}" data-ep="${ep}" type="button">
      <span class="ep-number">E${ep}</span>
      <span class="ep-title">Episode ${ep}</span>
    </button>`;
  }).join('');
  setTimeout(() => {
    const active = list.querySelector('.episode-btn.active');
    if (active) active.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }, 100);
}

/* ================================================================
   Init functions
   ================================================================ */
async function initMovie(id) {
  document.getElementById('bc-type').textContent = 'Movies';
  document.getElementById('bc-type').href = 'movies.html';
  const frame = document.getElementById('media-frame');
  const err = document.getElementById('player-error');
  try {
    mediaData = await VMedia.tmdbFetch(`/movie/${id}`, { append_to_response:'release_dates' });
    populateHero(mediaData, 'movie');
    populateCast(id, 'movie');
    loadRecs(id, 'movie');
    VStorage.addToMediaHistory(mediaData, 'movie');
    const url = VMedia.moviePlayerUrl(id);
    frame.src = url; frame.style.display = 'block';
    frame.onerror = () => {
      frame.style.display = 'none'; err.style.display = 'flex';
      document.getElementById('error-link').innerHTML =
        `<a href="${VApp.esc(url)}" target="_blank" style="color:var(--accent)">Open directly ↗</a>`;
    };
  } catch (e) {
    console.error(e); VApp.showToast('Movie not found','error');
    setTimeout(() => location.href = 'movies.html', 1500);
  }
}

async function initTV(id) {
  document.getElementById('bc-type').textContent = 'TV Shows';
  document.getElementById('bc-type').href = 'tv.html';
  try {
    mediaData = await VMedia.tmdbFetch(`/tv/${id}`);
    populateHero(mediaData, 'tv');
    populateCast(id, 'tv');
    loadRecs(id, 'tv');
    VStorage.addToMediaHistory(mediaData, 'tv');

    const validSeasons = (mediaData.seasons || []).filter(s => s.season_number > 0);
    const seasonSel = document.getElementById('season-select');
    seasonSel.style.display = '';
    validSeasons.forEach(s => {
      const o = document.createElement('option');
      o.value = s.season_number;
      o.textContent = `Season ${s.season_number}`;
      seasonSel.appendChild(o);
    });

    const prog = VStorage.getTVProgress(id);
    const startSeason = prog.season || 1;
    const startEp = prog.episode || 1;
    seasonSel.value = startSeason;
    updateEpBadge(startSeason, startEp);

    document.getElementById('player-area').classList.add('tv-mode');
    document.getElementById('episode-picker').style.display = '';

    await loadSeasonEpisodes(id, startSeason, startEp);
    seasonSel.addEventListener('change', async () => {
      const s = parseInt(seasonSel.value);
      await loadSeasonEpisodes(id, s, 1);
    });
  } catch (e) {
    console.error(e); VApp.showToast('Show not found','error');
    setTimeout(() => location.href = 'tv.html', 1500);
  }
}

async function initAnime(id) {
  document.getElementById('bc-type').textContent = 'Anime';
  document.getElementById('bc-type').href = 'anime.html';
  try {
    const raw = await VMedia.getAnimeById(id);
    mediaData = {
      id: raw.id,
      title: VMedia.animeTitle(raw),
      _cover: raw.coverImage?.large || raw.coverImage?.extraLarge || null,
    };
    populateAnimeHero(raw);
    populateCast(id, 'anime');
    loadRecs(id, 'anime');
    loadAnimeRelated(id); // Related / Other seasons
    VStorage.addToMediaHistory(mediaData, 'anime');

    const prog = VStorage.getAnimeProgress(id);
    const startEp = prog.episode || 1;
    const totalEps = raw.episodes || 0;

    document.getElementById('player-area').classList.add('tv-mode');
    document.getElementById('episode-picker').style.display = '';
    document.getElementById('ep-picker-label').textContent = 'Episodes';

    if (totalEps > 0) buildAnimeEpisodePicker(id, totalEps, startEp);
    else document.getElementById('episode-list').innerHTML = '';

    loadAnimeEpisodeIntoFrame(id, startEp);

  } catch (e) {
    console.error(e); VApp.showToast('Anime not found','error');
    setTimeout(() => location.href = 'anime.html', 1500);
  }
}

/* Boot */
if (mediaType === 'movie') initMovie(mediaId);
else if (mediaType === 'tv') initTV(mediaId);
else if (mediaType === 'anime') initAnime(mediaId);
else location.href = 'home.html';
</script>
