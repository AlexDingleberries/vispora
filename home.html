<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vispora - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body class="dark-theme">
    <nav class="navbar">
        <div class="nav-left">
            <div class="logo">VISPORA</div>
            <div class="nav-links">
                <a href="home.html" class="nav-item active">Home</a>
                <a href="games.html" class="nav-item">Games</a>
                <a href="settings.html" class="nav-item">Settings</a>
            </div>
        </div>
        <div class="nav-right" id="date-time"></div>
    </nav>

    <main class="home-container">
        <!-- Hero Section -->
        <section id="hero-banner" class="hero-banner"></section>

        <!-- Recent Games -->
        <section class="home-section">
            <div class="section-header">
                <h2>Recent Games</h2>
                <a href="games.html" class="view-all">View all</a>
            </div>
            <div id="recent-games" class="scroll-row"></div>
        </section>

        <!-- Popular Games -->
        <section class="home-section" style="margin-top: 40px;">
            <div class="section-header">
                <h2>Popular Games</h2>
                <a href="games.html" class="view-all">View all</a>
            </div>
            <div id="popular-games" class="scroll-row"></div>
        </section>

        <!-- Favorites -->
        <section class="home-section" style="margin-top: 40px;">
            <div class="section-header">
                <h2>Favorites</h2>
            </div>
            <div id="favorite-games" class="scroll-row"></div>
        </section>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/cloak.js"></script>
    <script src="js/search.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
