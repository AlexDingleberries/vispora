<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Home — vispora</title>
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/pages.css">
<script src="js/storage.js"></script>
<script src="js/theme.js"></script>
<script src="js/cloak.js"></script>
<script src="js/app.js"></script>
</head>
<body>
<div id="particles-js"></div>
<div id="nav-ph"></div>
<main class="home-page page-enter container">
  <div class="home-grid">

    <!-- Hero + Stats -->
    <div class="home-hero-section">
      <a id="hero-card" class="hero-card skeleton" style="min-height:200px" href="#"></a>
      <div style="display:flex;flex-direction:column;gap:12px;justify-content:center">
        <div class="stat-card"><div class="stat-value" id="s-games">—</div><div class="stat-label">Games</div></div>
        <div class="stat-card"><div class="stat-value" id="s-time">—</div><div class="stat-label">Playtime</div></div>
        <div class="stat-card"><div class="stat-value" id="s-favs">—</div><div class="stat-label">Favorites</div></div>
      </div>
    </div>

    <!-- Games of the Day -->
    <section>
      <div class="section-header">
        <h2 class="section-title">Games of the Day</h2>
      </div>
      <div id="day-wrap">
        <div class="games-row" id="day-row" style="pointer-events:none">
          ${[...Array(8)].map(()=>'<div class="skeleton" style="flex:0 0 155px;height:155px;border-radius:10px"></div>').join('')}
        </div>
      </div>
    </section>

     <!-- Recent -->
    <section>
      <div class="section-header">
        <h2 class="section-title">Recently Played</h2>
        <a href="#" class="section-viewall" id="recent-va" style="display:none">View All</a>
      </div>
      <div id="recent-wrap">
        <div class="empty-state"><div class="empty-state-icon">🎮</div><div class="empty-state-title">Nothing played yet</div><p>Head to the <a href="games.html" style="color:var(--accent)">Games Library</a> to start!</p></div>
      </div>
    </section>

    <!-- Favorites -->
    <section>
      <div class="section-header">
        <h2 class="section-title">Favorites</h2>
        <a href="#" class="section-viewall" id="fav-va" style="display:none">View All</a>
      </div>
      <div id="fav-wrap">
        <div class="empty-state"><div class="empty-state-icon">⭐</div><div class="empty-state-title">No favorites yet</div><p>Star games to see them here</p></div>
      </div>
    </section>

  </div>
</main>
<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script>
document.getElementById('nav-ph').innerHTML=VApp.navHTML('home');
VCloak.initCloak();VApp.initPanic();VApp.initParticles();
const dtEl=document.getElementById('nav-datetime');if(dtEl)VApp.startDatetime(dtEl);

let allGames=[];

async function init(){
  allGames=await VApp.loadGames();
  renderHero();renderStats();renderRecent();renderDay();renderFavs();
}

function renderHero(){
  if(!allGames.length)return;
  const featured=allGames.filter(g=>g.featured);
  const pool=featured.length?featured:allGames.slice(0,50);
  const g=pool[Math.floor(Math.random()*pool.length)];
  const card=document.getElementById('hero-card');
  card.classList.remove('skeleton');
  card.href=`player.html?id=${g.id}`;
  card.innerHTML=`
    ${g.cover?`<img src="${VApp.esc(g.cover)}" alt="${VApp.esc(g.name)}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">`:''}
    <div class="hero-card-content">
      <div class="hero-badge">Featured</div>
      <div class="hero-title">${VApp.esc(g.name)}</div>
      <div class="hero-author">by ${VApp.esc(g.author||'Unknown')}</div>
      <span class="btn btn-primary" style="display:inline-flex;width:fit-content">${VApp.IC.play} Play Now</span>
    </div>`;
  card.style.cssText+=';position:relative;overflow:hidden;aspect-ratio:16/9;';
}

function renderStats(){
  document.getElementById('s-games').textContent=allGames.length.toLocaleString();
  const tot=Object.values(VStorage.getAllPlaytime()).reduce((a,b)=>a+b,0);
  document.getElementById('s-time').textContent=VStorage.formatTime(tot)||'0m';
  document.getElementById('s-favs').textContent=VStorage.getFavorites().length;
}

function renderRecent(){
  const hist=VStorage.getHistory();const wrap=document.getElementById('recent-wrap');const va=document.getElementById('recent-va');
  if(!hist.length)return;
  va.style.display=hist.length>8?'':'none';
  const shown=hist.slice(0,8);
  const row=document.createElement('div');row.className='games-row';
  row.innerHTML=shown.map(h=>VApp.makeCard(h,{showRemove:true})).join('');
  wrap.innerHTML='';wrap.appendChild(row);
  VApp.initStars(row);
  // Remove from history
  row.addEventListener('click',async e=>{
    const rb=e.target.closest('.game-card-remove');if(!rb)return;
    e.preventDefault();e.stopPropagation();
    const id=Number(rb.dataset.id);
    const ok=await VApp.showModal({title:'Remove from History',message:'Remove this game from your recently played list?',confirmText:'Remove',dangerous:true});
    if(ok){VStorage.removeFromHistory(id);rb.closest('.game-card').remove();VApp.showToast('Removed from history');renderStats();}
  });
  va.addEventListener('click',e=>{e.preventDefault();showViewAll('Recent Games',hist);});
}

function renderDay(){
  const wrap = document.getElementById('day-wrap'); 
  if(!allGames.length) return;
  
  const seed = new Date().getDate();
  const shuffled = [...allGames].sort((a,b)=>(((a.id*1103+seed)%997)-((b.id*1103+seed)%997)));
  const pop = shuffled.slice(0, 12);
  
  const row = document.createElement('div');
  row.className = 'games-row';
  row.innerHTML = pop.map(g => VApp.makeCard(g)).join('');
  
  wrap.innerHTML = '';
  wrap.appendChild(row);
  VApp.initStars(row);
}

function renderFavs(){
  const ids=VStorage.getFavorites();const wrap=document.getElementById('fav-wrap');const va=document.getElementById('fav-va');
  if(!ids.length)return;
  const games=ids.map(id=>allGames.find(g=>g.id===id)).filter(Boolean);
  if(!games.length)return;
  va.style.display='';
  const row=document.createElement('div');row.className='games-row';
  row.innerHTML=games.slice(0,8).map(g=>VApp.makeCard(g)).join('');
  wrap.innerHTML='';wrap.appendChild(row);
  VApp.initStars(row);
  va.addEventListener('click',e=>{e.preventDefault();showViewAll('Favorites',games);});
}

function showViewAll(title,games){
  const o=document.createElement('div');o.className='modal-overlay';
  o.innerHTML=`<div class="modal" style="max-width:680px;width:100%">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0">
      <h3 style="margin:0">${VApp.esc(title)}</h3>
      <button class="btn-icon va-close" type="button">${VApp.IC.x}</button>
    </div>
    <div class="view-all-grid">${games.map(g=>VApp.makeCard(g)).join('')}</div>
  </div>`;
  o.querySelector('.va-close').onclick=()=>o.remove();
  o.onclick=e=>{if(e.target===o)o.remove();};
  VApp.initStars(o);
  document.body.appendChild(o);
}

init();
</script>
</body></html>
